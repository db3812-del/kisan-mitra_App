<!DOCTYPE html>
<html lang="hi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#1A1208">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="किसान मित्र">
  <meta name="description" content="MP किसानों का AI साथी — इंदौर, खरगोन, खंडवा">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>किसान मित्र</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-brand">
        <div class="hdr-icon">🌾</div>
        <div>
          <div class="hdr-title">किसान मित्र</div>
          <div class="hdr-sub">इंदौर · खरगोन · खंडवा</div>
        </div>
      </div>
      <div class="hdr-right">
        <div class="hdr-name">राम सिंह यादव</div>
        <div class="hdr-weather" id="hdr-weather">
          <span class="w-temp">⛅ 34°</span>
          <span class="w-desc">इंदौर</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <div id="page-home"    class="page active"></div>
    <div id="page-photo"   class="page"></div>
    <div id="page-weather" class="page"></div>
    <div id="page-pest"    class="page"></div>
    <div id="page-more"    class="page"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nb active" data-page="home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      होम
    </button>
    <button class="nb" data-page="photo" onclick="showPage('photo')">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      फोटो AI
    </button>
    <button class="nb" data-page="weather" onclick="showPage('weather')">
      <svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>
      मौसम
    </button>
    <button class="nb" data-page="pest" onclick="showPage('pest')">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="3" ry="2"/><path d="M8 14c-2.5.5-4 2-4 4v2h16v-2c0-2-1.5-3.5-4-4"/><path d="M12 7v11M6 11c-2-1-3-2-2-4M18 11c2-1 3-2 2-4"/></svg>
      कीट
    </button>
    <button class="nb" data-page="more" onclick="showPage('more')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      और
    </button>
  </nav>

  <!-- PEST DETAIL OVERLAY -->
  <div id="pest-overlay" class="overlay">
    <div class="overlay-hdr">
      <button class="back-btn" onclick="closePestOverlay()">←</button>
      <div class="overlay-title" id="pest-ov-title">कीट जानकारी</div>
    </div>
    <div class="overlay-body" id="pest-ov-body"></div>
    <div class="chat-input-bar">
      <input id="pest-chat-input" class="chat-input" placeholder="कीट के बारे में पूछें..." onkeydown="if(event.key==='Enter')sendPestChat()">
      <button class="chat-mic" id="pest-mic-btn" onclick="startVoice('pest-chat-input','pest-mic-btn')">🎤</button>
      <button class="chat-send" onclick="sendPestChat()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- GENERAL CHAT OVERLAY -->
  <div id="chat-overlay" class="overlay">
    <div class="overlay-hdr">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="overlay-title">🤖 AI से बात करें</div>
    </div>
    <div class="overlay-body">
      <div id="chat-thread-main" class="chat-thread"></div>
    </div>
    <div class="chat-input-bar">
      <input id="chat-input-main" class="chat-input" placeholder="हिंदी में पूछें..." onkeydown="if(event.key==='Enter')sendMainChat()">
      <button class="chat-mic" id="main-mic-btn" onclick="startVoice('chat-input-main','main-mic-btn')">🎤</button>
      <button class="chat-send" onclick="sendMainChat()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<!-- Hidden file inputs -->
<input id="cam-input" type="file" accept="image/*" capture="environment" style="display:none">
<input id="gal-input" type="file" accept="image/*" style="display:none">

<script src="app.js"></script>
</body>
</html>
