<!DOCTYPE html>
<html lang="hi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#3B6D11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="किसान मित्र">
  <meta name="description" content="MP किसानों के लिए AI फार्मिंग असिस्टेंट — इंदौर, खरगोन, खंडवा">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <title>किसान मित्र | KisanMitra</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <h1>🌾 किसान मित्र</h1>
      <small>इंदौर · खरगोन · खंडवा | MP</small>
    </div>
    <div class="hdr-right">
      <div class="hdr-name">राम सिंह यादव</div>
      <div class="weather-pill">⛅ 34°C · इंदौर</div>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <div id="page-home" class="page"></div>
    <div id="page-photo" class="page"></div>
    <div id="page-weather" class="page"></div>
    <div id="page-pest" class="page"></div>
    <div id="page-more" class="page"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn" data-page="home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      होम
    </button>
    <button class="nav-btn" data-page="photo" onclick="showPage('photo')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      फोटो AI
    </button>
    <button class="nav-btn" data-page="weather" onclick="showPage('weather')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>
      </svg>
      मौसम
    </button>
    <button class="nav-btn" data-page="pest" onclick="showPage('pest')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <ellipse cx="12" cy="5" rx="3" ry="2"/>
        <path d="M8 14c-2.5.5-4 2-4 4v2h16v-2c0-2-1.5-3.5-4-4"/>
        <path d="M12 7v11M6 11c-2-1-3-2-2-4M18 11c2-1 3-2 2-4M4 17c-2 0-3-1-2-3M20 17c2 0 3-1 2-3"/>
      </svg>
      कीट
    </button>
    <button class="nav-btn" data-page="more" onclick="showPage('more')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      और
    </button>
  </nav>

  <!-- INSTALL PROMPT -->
  <div id="install-prompt">
    <div class="ip-text">📲 <b>किसान मित्र</b> को होम स्क्रीन पर जोड़ें — बिना इंटरनेट भी चलेगा!</div>
    <button class="ip-install" onclick="doInstall()">इंस्टॉल करें</button>
    <button class="ip-close" onclick="closeInstall()">✕</button>
  </div>

</div>

<!-- Hidden file input -->
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">

<script src="app.js"></script>
</body>
</html>
